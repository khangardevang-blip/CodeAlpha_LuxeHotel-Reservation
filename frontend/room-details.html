<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Details - LuxeHotel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">LuxeHotel.</a>
    <nav>
        <ul>
            <!-- Populated by auth.js -->
        </ul>
    </nav>
</header>

<main>
    <div class="glass-form" id="roomContainer" style="max-width: 800px; margin: 0 auto 2rem auto;">
        <h2 id="roomTitle" style="margin-bottom: 1rem;">Loading Room...</h2>
        <img id="roomImg" src="" alt="Room" style="width: 100%; height: auto; border-radius: var(--radius); margin-bottom: 1rem; display: none;">
        <p id="roomDesc" style="color: var(--text-muted); margin-bottom: 1rem;"></p>
        <h3 id="roomPrice" style="color: var(--accent); margin-bottom: 1.5rem;"></h3>
        <a id="bookBtn" href="#" class="btn" style="display: block; text-align: center;">Book Now</a>
    </div>

    <div class="glass-form" style="max-width: 800px; margin: 0 auto 2rem auto;">
        <h3 style="margin-bottom: 1rem;">Guest Reviews</h3>
        <div id="reviewsList" style="margin-bottom: 2rem;">
            <p>Loading reviews...</p>
        </div>

        <h4 style="margin-bottom: 1rem;">Leave a Review</h4>
        <div id="reviewAlert" class="alert" style="display: none;"></div>
        <form id="reviewForm" style="display: none;">
            <div class="form-group">
                <label>Rating (1 to 5)</label>
                <select id="reviewRating" class="form-control" required>
                    <option value="5">5 - Excellent</option>
                    <option value="4">4 - Good</option>
                    <option value="3">3 - Average</option>
                    <option value="2">2 - Poor</option>
                    <option value="1">1 - Terrible</option>
                </select>
            </div>
            <div class="form-group">
                <label>Comment</label>
                <textarea id="reviewComment" class="form-control" rows="4" required placeholder="Tell us about your stay..."></textarea>
            </div>
            <button type="submit" class="btn">Submit Review</button>
        </form>
        <p id="loginPrompt" style="color: var(--text-muted); font-size: 0.9rem;">You must be <a href="login.html" style="color:var(--primary);">logged in</a> to leave a review.</p>
    </div>
</main>

<footer>
    <p>&copy; 2026 LuxeHotel. All rights reserved.</p>
</footer>

<script src="js/auth.js"></script>
<script>
    const API_BASE = 'http://localhost:8080/api';
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('roomId');

    if (!roomId) {
        window.location.href = 'index.html';
    }

    const user = getCurrentUser();
    if (user) {
        document.getElementById('reviewForm').style.display = 'block';
        document.getElementById('loginPrompt').style.display = 'none';
    }

    async function loadRoomDetails() {
        try {
            const response = await fetch(`${API_BASE}/rooms/${roomId}`);
            if (!response.ok) throw new Error('Room not found');
            const room = await response.json();
            
            document.getElementById('roomTitle').textContent = `${room.type} at ${room.hotel.name}, ${room.hotel.city}`;
            const img = document.getElementById('roomImg');
            img.src = room.imageUrl;
            img.style.display = 'block';
            document.getElementById('roomDesc').textContent = room.description;
            document.getElementById('roomPrice').textContent = `₹${room.pricePerNight} / night`;
            document.getElementById('bookBtn').href = `booking.html?roomId=${room.id}`;
        } catch (error) {
            document.getElementById('roomTitle').textContent = 'Error loading room details.';
        }
    }

    async function loadReviews() {
        try {
            const response = await fetch(`${API_BASE}/reviews/${roomId}`);
            const reviews = await response.json();
            const list = document.getElementById('reviewsList');
            list.innerHTML = '';
            
            if (reviews.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted);">No reviews yet. Be the first to review!</p>';
                return;
            }

            reviews.forEach(r => {
                const div = document.createElement('div');
                div.style.borderBottom = '1px solid var(--border-color)';
                div.style.paddingBottom = '1rem';
                div.style.marginBottom = '1rem';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom: 0.5rem;">
                        <strong>${r.guestName}</strong>
                        <span style="color: #f59e0b; font-weight: bold;">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                    </div>
                    <p style="color: var(--text-main);">${r.comment}</p>
                `;
                list.appendChild(div);
            });
        } catch (error) {
            document.getElementById('reviewsList').innerHTML = '<p style="color: red;">Failed to load reviews.</p>';
        }
    }

    document.getElementById('reviewForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!user) return;

        const rating = document.getElementById('reviewRating').value;
        const comment = document.getElementById('reviewComment').value;
        const alertBox = document.getElementById('reviewAlert');

        const formData = new URLSearchParams();
        formData.append('guestName', user.name);
        formData.append('rating', rating);
        formData.append('comment', comment);

        try {
            const response = await fetch(`${API_BASE}/reviews/${roomId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            });

            if (response.ok) {
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Review submitted successfully!';
                alertBox.style.display = 'block';
                document.getElementById('reviewForm').reset();
                loadReviews();
            } else {
                const errText = await response.text();
                alertBox.className = 'alert alert-error';
                alertBox.textContent = errText;
                alertBox.style.display = 'block';
            }
        } catch (error) {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Network error.';
            alertBox.style.display = 'block';
        }
    });

    loadRoomDetails();
    loadReviews();
</script>
</body>
</html>
