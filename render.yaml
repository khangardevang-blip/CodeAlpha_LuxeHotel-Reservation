services:
  - type: web
    name: hotel-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8080"

  - type: web
    name: hotel-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: "echo 'No build step required'"
    staticPublishPath: ./
